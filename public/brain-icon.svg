<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>

    <!-- Enhanced glow filters -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pinkGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background matching login page -->
  <rect width="512" height="512" fill="#0a1727"/>

  <!-- Outer glow effects - pink circles -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#ec4899" stroke-width="3" opacity="0.2" filter="url(#pinkGlow)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c026d3" stroke-width="2" opacity="0.15"/>

  <!-- Inner circle with dark gradient background matching login -->
  <circle cx="256" cy="256" r="200" fill="url(#bgGradient)" stroke="#ec4899" stroke-width="2" opacity="0.6"/>

  <!-- Brain icon - EVEN LARGER scale and EVEN THICKER strokes -->
  <g transform="translate(256, 256) scale(13)" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M0 -7a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 0 6Z"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Right hemisphere -->
    <path d="M0 -7a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 0 6Z"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Center connection -->
    <path d="M3 1a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Detail lines -->
    <path d="M5.599 -5.5a3 3 0 0 0 .399-1.375"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M-5.997 -6.875A3 3 0 0 0 -5.599 -5.5"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M-8.523 -1.104a4 4 0 0 1 .585-.396"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M7.938 -1.5a4 4 0 0 1 .585.396"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M-6 6a4 4 0 0 1-1.967-.516"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M7.967 5.484A4 4 0 0 1 6 6"
          fill="none"
          stroke="#22d3ee"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Orbiting dots - outside the main icon area -->
  <circle cx="256" cy="60" r="10" fill="#f472b6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="452" r="8" fill="#c084fc" opacity="0.85" filter="url(#glow)"/>
</svg>
