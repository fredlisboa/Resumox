<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="pageShadow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <!-- Vibrant purple gradient background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <path d="M96 0 H416 Q512 0 512 96 V200 Q256 260 0 200 V96 Q0 0 96 0Z" fill="white" fill-opacity="0.07"/>

  <!-- Large open book - fills most of the icon -->
  <g transform="translate(256, 236)">
    <!-- Left page -->
    <path d="M-16 -130 L-16 130 L-175 95 L-175 -95 Z" fill="white" fill-opacity="0.95" stroke="white" stroke-width="2" stroke-opacity="0.3"/>
    <!-- Right page -->
    <path d="M16 -130 L16 130 L175 95 L175 -95 Z" fill="url(#pageShadow)" stroke="white" stroke-width="2" stroke-opacity="0.3"/>

    <!-- Spine curve -->
    <path d="M-16 -130 Q0 -142 16 -130 L16 130 Q0 142 -16 130 Z" fill="white" fill-opacity="0.6"/>

    <!-- Left page lines (thick for visibility at small sizes) -->
    <line x1="-148" y1="-60" x2="-40" y2="-47" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round" stroke-opacity="0.45"/>
    <line x1="-148" y1="-20" x2="-40" y2="-7" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round" stroke-opacity="0.35"/>
    <line x1="-148" y1="20" x2="-40" y2="33" stroke="#8B5CE7" stroke-width="10" stroke-linecap="round" stroke-opacity="0.25"/>

    <!-- Right page lines -->
    <line x1="40" y1="-47" x2="148" y2="-60" stroke="#6C5CE7" stroke-width="10" stroke-linecap="round" stroke-opacity="0.45"/>
    <line x1="40" y1="-7" x2="148" y2="-20" stroke="#6C5CE7" stroke-width="10" stroke-linecap="round" stroke-opacity="0.35"/>
    <line x1="40" y1="33" x2="148" y2="20" stroke="#6C5CE7" stroke-width="10" stroke-linecap="round" stroke-opacity="0.25"/>

    <!-- Sparkle/star top-right to suggest "summary/insight" -->
    <g transform="translate(130, -110)">
      <path d="M0 -20 L5 -5 L20 0 L5 5 L0 20 L-5 5 L-20 0 L-5 -5 Z" fill="white" fill-opacity="0.9"/>
    </g>

    <!-- Small sparkle bottom-left -->
    <g transform="translate(-140, 85)">
      <path d="M0 -12 L3 -3 L12 0 L3 3 L0 12 L-3 3 L-12 0 L-3 -3 Z" fill="white" fill-opacity="0.7"/>
    </g>
  </g>
</svg>
